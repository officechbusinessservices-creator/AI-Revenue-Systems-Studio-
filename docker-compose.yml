version: "3.9"

# =============================================================================
# CompliCore — Production Stack
# Services: postgres · redis · qdrant · temporal · temporal-ui ·
#           prometheus · grafana · ollama (optional local LLM)
#
# Start all: docker compose up -d
# Start infra only: docker compose up -d postgres redis qdrant temporal
# View logs: docker compose logs -f [service]
# =============================================================================

x-restart-policy: &restart-policy
  restart: unless-stopped

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 20s

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: complicore-postgres
    <<: *restart-policy
    environment:
      POSTGRES_DB:       complicore
      POSTGRES_USER:     complicore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-complicore}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complicore -d complicore"]
      <<: *healthcheck-defaults
    networks:
      - complicore-net

  # ---------------------------------------------------------------------------
  # PostgreSQL — Temporal's dedicated store (separate from app DB)
  # ---------------------------------------------------------------------------
  temporal-postgres:
    image: postgres:16-alpine
    container_name: temporal-postgres
    <<: *restart-policy
    environment:
      POSTGRES_DB:       temporal
      POSTGRES_USER:     temporal
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD:-temporal}
    volumes:
      - temporal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      <<: *healthcheck-defaults
    networks:
      - complicore-net

  # ---------------------------------------------------------------------------
  # Redis 7 — Job queue, idempotency, session cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: complicore-redis
    <<: *restart-policy
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-defaults
    networks:
      - complicore-net

  # ---------------------------------------------------------------------------
  # Qdrant — Vector store for agent RAG
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: complicore-qdrant
    <<: *restart-policy
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      <<: *healthcheck-defaults
    networks:
      - complicore-net

  # ---------------------------------------------------------------------------
  # Temporal Server — Workflow orchestration engine
  # ---------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:latest
    container_name: complicore-temporal
    <<: *restart-policy
    depends_on:
      temporal-postgres:
        condition: service_healthy
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal}
      - POSTGRES_SEEDS=temporal-postgres
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamicconfig/development.yaml
    volumes:
      - ./infra/temporal/dynamicconfig:/etc/temporal/dynamicconfig:ro
    healthcheck:
      test: ["CMD", "tctl", "--address", "localhost:7233", "cluster", "health"]
      <<: *healthcheck-defaults
    networks:
      - complicore-net

  # ---------------------------------------------------------------------------
  # Temporal Web UI — Workflow visibility
  # ---------------------------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:latest
    container_name: complicore-temporal-ui
    <<: *restart-policy
    depends_on:
      - temporal
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000,http://localhost:4000
    networks:
      - complicore-net

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: complicore-prometheus
    <<: *restart-policy
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      <<: *healthcheck-defaults
    networks:
      - complicore-net

  # ---------------------------------------------------------------------------
  # Grafana — Metrics dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: complicore-grafana
    <<: *restart-policy
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-complicore}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/complicore.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q 'ok'"]
      <<: *healthcheck-defaults
    networks:
      - complicore-net

  # ---------------------------------------------------------------------------
  # Ollama — Local LLM serving (Nemotron / Llama)
  # Optional: comment out if using hosted models only
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: complicore-ollama
    <<: *restart-policy
    profiles:
      - local-llm          # Start with: docker compose --profile local-llm up -d
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      <<: *healthcheck-defaults
    networks:
      - complicore-net

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  pgdata:
  temporal_pgdata:
  redisdata:
  qdrant_data:
  prometheus_data:
  grafana_data:
  ollama_models:

# =============================================================================
# Networks
# =============================================================================
networks:
  complicore-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
